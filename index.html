<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash - Rafique Studios</title>
    <style>
        :root {
            --neon-pink: #f72585;
            --neon-blue: #4cc9f0;
            --neon-purple: #7209b7;
            --gold: #ffd700;
            --bg-dark: #010105;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a0a2a 0%, #010105 100%);
        }

        canvas {
            display: block;
            box-shadow: 0 0 80px rgba(76, 201, 240, 0.15);
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        #hud {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        #score-val {
            color: #fff;
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 0 0 20px var(--neon-blue);
        }

        #best-score-hud {
            color: var(--gold);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .branding {
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .menu-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 15, 0.95);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--neon-blue);
            pointer-events: auto;
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
            min-width: 320px;
        }

        .visible { display: flex !important; }

        .studio-name {
            color: var(--gold);
            font-size: 0.9rem;
            letter-spacing: 4px;
            margin-bottom: -10px;
        }

        h1 { 
            color: #fff; 
            margin: 0; 
            font-size: 2.2rem;
            text-shadow: 0 0 10px var(--neon-blue);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
        }

        .stat-label { color: #888; font-size: 0.7rem; text-transform: uppercase; }
        .stat-value { color: #fff; font-size: 1.4rem; font-weight: bold; }

        button {
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 16px 30px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover { background: #fff; transform: scale(1.02); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <div id="hud">
            <div id="best-score-hud">BEST: 0</div>
            <div id="score-val">0</div>
        </div>

        <div id="start-screen" class="menu-box visible">
            <div class="studio-name">RAFIQUE STUDIOS PRESENTS</div>
            <h1>NEON DASH</h1>
            <p style="color: #aaa;">Touch to boost engine</p>
            <button id="start-btn">START ENGINE</button>
        </div>

        <div id="game-over-screen" class="menu-box">
            <div class="studio-name">RAFIQUE STUDIOS</div>
            <h1 style="color: var(--neon-pink)">CRASHED</h1>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">SCORE</div>
                    <div id="final-score" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">BEST</div>
                    <div id="high-score" class="stat-value">0</div>
                </div>
            </div>
            <button id="restart-btn">RETRY MISSION</button>
        </div>

        <div class="branding">© 2025 RAFIQUE STUDIOS</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const GRAVITY = 0.22;
    const FLAP = -5.0;
    const PIPE_WIDTH = 80;
    const PIPE_GAP_HEIGHT = 220;
    const PIPE_SPACING_X = 350;
    
    let state = 'START';
    let score = 0;
    let high = parseInt(localStorage.getItem('rafique_neon_best')) || 0;
    let speedMult = 1.0;
    let pipes = [];
    let lastTime = 0;
    let lastPipeX = 0;
    let stars = [];
    let planets = [];

    const AudioEngine = {
        ctx: null,
        init() { 
            if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        playSynth(options) {
            this.init();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const { freq, type, duration, volume, rampTo = 0, filterFreq = 2000 } = options;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            const filter = this.ctx.createBiquadFilter();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            if (rampTo) osc.frequency.exponentialRampToValueAtTime(rampTo, this.ctx.currentTime + duration);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(filterFreq, this.ctx.currentTime);
            gain.gain.setValueAtTime(volume, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        boost() { this.playSynth({ freq: 150, rampTo: 40, type: 'triangle', duration: 0.2, volume: 0.1, filterFreq: 800 }); },
        point() { 
            this.playSynth({ freq: 880, type: 'sine', duration: 0.15, volume: 0.1 });
            setTimeout(() => this.playSynth({ freq: 1320, type: 'sine', duration: 0.2, volume: 0.05 }), 50);
        },
        crash() {
            this.playSynth({ freq: 100, rampTo: 10, type: 'sawtooth', duration: 0.8, volume: 0.3, filterFreq: 400 });
            this.playSynth({ freq: 60, type: 'sine', duration: 1.0, volume: 0.2, filterFreq: 200 });
        }
    };

    const ship = {
        x: 0, y: 0, w: 55, h: 35, vel: 0, deg: 0,
        reset() {
            this.x = canvas.width * 0.25;
            this.y = canvas.height / 2;
            this.vel = 0;
            this.deg = 0;
        },
        update() {
            if (state === 'PLAYING') {
                this.vel += GRAVITY;
                this.y += this.vel;
                this.deg = Math.max(-0.4, Math.min(0.6, this.vel * 0.08));
                if (this.y < -20 || this.y + this.h > canvas.height + 20) endGame();
            }
        },
        draw() {
            ctx.save();
            ctx.translate(this.x + this.w/2, this.y + this.h/2);
            ctx.rotate(this.deg);
            ctx.fillStyle = '#4cc9f0';
            ctx.beginPath();
            ctx.moveTo(25, 0); 
            ctx.lineTo(-15, -18); 
            ctx.lineTo(-25, -12);
            ctx.lineTo(-20, 0);
            ctx.lineTo(-25, 12);
            ctx.lineTo(-15, 18);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.8;
            ctx.beginPath();
            ctx.ellipse(5, -2, 10, 5, 0, 0, 7);
            ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = '#f72585';
            ctx.fillRect(-12, -15, 8, 4);
            ctx.fillRect(-12, 11, 8, 4);
            if (state === 'PLAYING' && Math.random() > 0.3) {
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.moveTo(-22, 0);
                ctx.lineTo(-35 - Math.random()*15, 0);
                ctx.strokeStyle = '#f72585';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
            ctx.restore();
        }
    };

    class Obstacle {
        constructor(x) {
            this.x = x;
            this.top = Math.random() * (canvas.height - PIPE_GAP_HEIGHT - 160) + 80;
            this.passed = false;
        }
        update() { this.x -= 3.8 * speedMult; }
        draw() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#4cc9f0';
            ctx.fillStyle = '#11112b';
            ctx.strokeStyle = '#4cc9f0';
            ctx.lineWidth = 3;
            ctx.fillRect(this.x, 0, PIPE_WIDTH, this.top);
            ctx.strokeRect(this.x, -5, PIPE_WIDTH, this.top + 5);
            const bY = this.top + PIPE_GAP_HEIGHT;
            ctx.fillRect(this.x, bY, PIPE_WIDTH, canvas.height - bY);
            ctx.strokeRect(this.x, bY, PIPE_WIDTH, canvas.height - bY + 5);
            ctx.shadowBlur = 0;
        }
    }

    class Planet {
        constructor(isInitial = false) {
            this.x = isInitial ? Math.random() * canvas.width : canvas.width + 100;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 40 + 20;
            this.speed = Math.random() * 0.4 + 0.1;
            this.color = ['#3a0ca3', '#7209b7', '#480ca8', '#3f37c9', '#4361ee'][Math.floor(Math.random() * 5)];
            this.hasRing = Math.random() > 0.7;
            this.rotation = Math.random() * Math.PI;
        }
        update() {
            if (state === 'PLAYING') {
                this.x -= this.speed * speedMult;
                if (this.x + this.size + 50 < 0) {
                    this.x = canvas.width + 100;
                    this.y = Math.random() * canvas.height;
                }
            }
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = 0.4;
            ctx.translate(this.x, this.y);
            
            if (this.hasRing) {
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size * 1.8, this.size * 0.4, this.rotation, 0, Math.PI * 2);
                ctx.stroke();
            }

            const grad = ctx.createRadialGradient(-this.size/3, -this.size/3, this.size/10, 0, 0, this.size);
            grad.addColorStop(0, '#fff');
            grad.addColorStop(0.3, this.color);
            grad.addColorStop(1, '#000');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, this.size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            ctx.globalAlpha = 1.0;
        }
    }

    function initEnvironment() {
        stars = [];
        planets = [];
        for(let i=0; i<80; i++) {
            stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: Math.random()*0.5});
        }
        for(let i=0; i<3; i++) {
            planets.push(new Planet(true));
        }
    }

    function resize() {
        const h = window.innerHeight;
        const w = Math.min(window.innerWidth, h * (9/16));
        canvas.width = 450;
        canvas.height = 800;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        document.getElementById('best-score-hud').innerText = `BEST: ${high}`;
        initEnvironment();
        ship.reset();
    }

    function startGame() {
        AudioEngine.init();
        score = 0;
        speedMult = 1.0;
        pipes = [];
        lastPipeX = canvas.width + 100;
        pipes.push(new Obstacle(lastPipeX));
        ship.reset();
        document.getElementById('score-val').innerText = "0";
        state = 'PLAYING';
        document.getElementById('start-screen').classList.remove('visible');
        document.getElementById('game-over-screen').classList.remove('visible');
        AudioEngine.boost();
    }

    function endGame() {
        if (state === 'GAMEOVER') return;
        state = 'GAMEOVER';
        AudioEngine.crash();
        if (score > high) {
            high = score;
            localStorage.setItem('rafique_neon_best', high);
        }
        document.getElementById('final-score').innerText = score;
        document.getElementById('high-score').innerText = high;
        document.getElementById('best-score-hud').innerText = `BEST: ${high}`;
        document.getElementById('game-over-screen').classList.add('visible');
    }

    function loop(t) {
        const dt = t - lastTime;
        lastTime = t;
        ctx.fillStyle = '#010105';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Background Elements
        planets.forEach(p => { p.update(); p.draw(); });
        ctx.fillStyle = '#fff';
        stars.forEach(s => {
            ctx.fillRect(s.x, s.y, s.s, s.s);
            if(state === 'PLAYING') {
                s.x -= s.v * speedMult;
                if(s.x < 0) s.x = canvas.width;
            }
        });

        if (state === 'PLAYING') {
            if (canvas.width - lastPipeX >= PIPE_SPACING_X) {
                lastPipeX = canvas.width;
                pipes.push(new Obstacle(canvas.width));
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                const p = pipes[i];
                p.update();
                p.draw();
                if(i === pipes.length - 1) lastPipeX = p.x;

                const pad = 8;
                if (ship.x + ship.w - pad > p.x && ship.x + pad < p.x + PIPE_WIDTH) {
                    if (ship.y + pad < p.top || ship.y + ship.h - pad > p.top + PIPE_GAP_HEIGHT) endGame();
                }

                if (!p.passed && p.x + PIPE_WIDTH < ship.x) {
                    p.passed = true;
                    score++;
                    document.getElementById('score-val').innerText = score;
                    AudioEngine.point();
                    if (score % 10 === 0) speedMult *= 1.05;
                }
                if (p.x + PIPE_WIDTH < -50) pipes.splice(i, 1);
            }
        } else if (state === 'GAMEOVER') {
            pipes.forEach(p => p.draw());
        }

        ship.update();
        ship.draw();
        requestAnimationFrame(loop);
    }

    const handleAction = (e) => {
        if (state === 'PLAYING') {
            ship.vel = FLAP;
            AudioEngine.boost();
        }
    };

    document.getElementById('start-btn').onclick = (e) => { e.stopPropagation(); startGame(); };
    document.getElementById('restart-btn').onclick = (e) => { e.stopPropagation(); startGame(); };
    window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON') handleAction(); });
    window.addEventListener('touchstart', (e) => { 
        if(e.target.tagName !== 'BUTTON') {
            if(state === 'PLAYING') e.preventDefault();
            handleAction(); 
        }
    }, {passive: false});
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleAction(); });

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(loop);
</script>
</body>
</html>
