<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash 2.0 - Rafique Studios</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --gold: #ffd700;
            --bg-dark: #010103;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        canvas {
            display: block;
            background: radial-gradient(circle at center, #050510 0%, #000 100%);
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center;
            z-index: 100;
        }

        /* Top Best Score Bar */
        #top-best-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid var(--neon-blue);
            padding: 10px 0;
            text-align: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            pointer-events: auto;
        }

        .top-best-text {
            color: var(--gold);
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        #hud { margin-top: 40px; }
        #score-val {
            color: #fff; font-size: 5rem; font-weight: 900;
            text-shadow: 0 0 20px var(--neon-blue);
            font-style: italic;
        }

        .menu-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 15, 0.98);
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--neon-blue);
            pointer-events: auto;
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            backdrop-filter: blur(15px);
            min-width: 320px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.3);
        }

        .visible { display: flex !important; }

        h1 { 
            color: #fff; margin: 0; font-size: 2.4rem;
            text-shadow: 0 0 15px var(--neon-pink);
            letter-spacing: 2px;
        }

        button {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            color: #fff; border: none;
            padding: 18px 36px; font-size: 1.1rem; font-weight: 900;
            border-radius: 10px; cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }

        button:active { transform: scale(0.95); }
        .btn-alt { background: rgba(255,255,255,0.05); border: 1px solid var(--neon-blue); color: var(--neon-blue); box-shadow: none; }

        #tutorial-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center;
            z-index: 200; color: white; pointer-events: auto;
        }

        .tutorial-card {
            background: #000; padding: 40px;
            border-radius: 20px; border: 1px solid var(--neon-pink);
            text-align: center;
        }

        .branding {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem; letter-spacing: 5px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <!-- Always visible top bar -->
        <div id="top-best-bar">
            <div class="top-best-text">BEST RECORD: <span class="best-val">0</span></div>
        </div>

        <div id="hud"><div id="score-val">0</div></div>

        <!-- Main Menu -->
        <div id="start-screen" class="menu-box visible">
            <div style="color: var(--gold); font-size: 0.7rem; letter-spacing: 4px;">RAFIQUE STUDIOS PRESENTS</div>
            <h1>NEON DASH 2.0</h1>
            <p style="color: #888;">Ready for deep space mission?</p>
            <button id="launch-btn">LAUNCH MISSION</button>
        </div>

        <!-- Tutorial Modal -->
        <div id="permission-modal" class="menu-box">
            <h2 style="color: #fff; margin: 0;">PILOT GUIDANCE?</h2>
            <p style="color: #aaa;">Would you like a quick tutorial before take-off?</p>
            <button id="tutorial-yes">YES, GUIDE ME</button>
            <button id="tutorial-no" class="btn-alt">NO, I'M READY</button>
        </div>

        <!-- Game Over -->
        <div id="game-over-screen" class="menu-box">
            <h1 style="color: var(--neon-pink)">MISSION FAILED</h1>
            <div style="color: #fff; font-size: 1.5rem;">SCORE: <span id="final-score">0</span></div>
            <div style="color: var(--gold); font-size: 1.1rem;">YOUR BEST: <span class="best-val">0</span></div>
            <button id="restart-btn">RETRY MISSION</button>
        </div>

        <!-- Tutorial Steps -->
        <div id="tutorial-overlay">
            <div class="tutorial-card">
                <div id="tut-icon" style="font-size: 4rem; margin-bottom: 20px;">👆</div>
                <h2 id="tut-text">Tap Screen to Boost Up</h2>
                <p style="color: #555;">Tap anywhere to continue</p>
            </div>
        </div>

        <div class="branding">© 2025 RAFIQUE STUDIOS</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const GRAVITY = 0.26;
    const FLAP = -6.0;
    const PIPE_WIDTH = 90;
    const PIPE_GAP_HEIGHT = 210;
    const PIPE_SPACING_X = 380;
    
    let state = 'START';
    let score = 0;
    let high = parseInt(localStorage.getItem('neon_dash_2_best')) || 0;
    let speedMult = 1.0;
    let pipes = [];
    let lastTime = 0;
    let stars = [];
    let planets = [];
    let particles = [];
    let speedTimer = 0;
    let lastPipeX = 0;

    // Best Score ko UI par hamesha update rakhne ke liye function
    function updateBestUI() {
        document.querySelectorAll('.best-val').forEach(el => el.innerText = high);
    }

    const AudioEngine = {
        ctx: null,
        init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        play(f, t, d, v, s) {
            this.init();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const o = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            o.type = t;
            o.frequency.setValueAtTime(f, this.ctx.currentTime);
            if(s) o.frequency.exponentialRampToValueAtTime(s, this.ctx.currentTime + d);
            g.gain.setValueAtTime(v, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
            o.connect(g); g.connect(this.ctx.destination);
            o.start(); o.stop(this.ctx.currentTime + d);
        },
        boost() { this.play(300, 'sawtooth', 0.1, 0.1, 50); },
        point() { this.play(800, 'sine', 0.2, 0.1, 1200); },
        crash() { this.play(150, 'sawtooth', 0.8, 0.3, 20); }
    };

    const ship = {
        x: 0, y: 0, w: 75, h: 35, vel: 0, deg: 0,
        reset() { this.x = canvas.width * 0.22; this.y = canvas.height / 2; this.vel = 0; this.deg = 0; },
        update() {
            if (state === 'PLAYING') {
                this.vel += GRAVITY;
                this.y += this.vel;
                this.deg = Math.max(-0.4, Math.min(0.6, this.vel * 0.05));
                if(Math.random() > 0.3) {
                    particles.push({
                        x: this.x - 5, y: this.y + 15, s: Math.random()*6+2, 
                        l: 1.0, c: Math.random() > 0.5 ? '#ff007f' : '#00f3ff'
                    });
                }
                if (this.y < -50 || this.y + this.h > canvas.height + 50) endGame();
            }
        },
        draw() {
            ctx.save();
            ctx.translate(this.x + this.w/2, this.y + this.h/2);
            ctx.rotate(this.deg);
            
            // Pixel-art design fuselage
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.moveTo(38, 0); 
            ctx.lineTo(15, -18); 
            ctx.lineTo(-35, -10); 
            ctx.lineTo(-35, 10); 
            ctx.lineTo(15, 18); 
            ctx.closePath(); ctx.fill();
            
            // Cockpit
            ctx.fillStyle = 'rgba(0, 243, 255, 0.6)';
            ctx.beginPath();
            ctx.moveTo(30, 0); ctx.lineTo(10, -10); ctx.lineTo(0, 0); ctx.lineTo(10, 10);
            ctx.closePath(); ctx.fill();

            // Neon details
            ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(5, -12); ctx.lineTo(-25, -5); ctx.stroke();
            ctx.strokeStyle = '#ff007f';
            ctx.beginPath(); ctx.moveTo(5, 12); ctx.lineTo(-25, 5); ctx.stroke();

            // Dual Thrusters glow
            ctx.shadowBlur = 15; ctx.shadowColor = '#ff007f';
            ctx.fillStyle = '#ff007f';
            ctx.fillRect(-38, -14, 8, 8);
            ctx.fillRect(-38, 6, 8, 8);
            
            ctx.restore();
            ctx.shadowBlur = 0;
        }
    };

    class Obstacle {
        constructor(x) {
            this.x = x;
            this.top = Math.random() * (canvas.height - 450) + 120;
            this.passed = false;
        }
        update() { this.x -= 4.5 * speedMult; }
        draw() {
            ctx.fillStyle = '#050515';
            ctx.strokeStyle = '#00f3ff';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 10; ctx.shadowColor = '#00f3ff';
            
            ctx.fillRect(this.x, 0, PIPE_WIDTH, this.top);
            ctx.strokeRect(this.x, -5, PIPE_WIDTH, this.top + 5);
            
            const bY = this.top + PIPE_GAP_HEIGHT;
            ctx.fillRect(this.x, bY, PIPE_WIDTH, canvas.height - bY);
            ctx.strokeRect(this.x, bY, PIPE_WIDTH, canvas.height - bY + 10);
            
            ctx.shadowBlur = 5; ctx.shadowColor = '#ff007f';
            ctx.strokeStyle = '#ff007f'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(this.x + 15, this.top - 15); ctx.lineTo(this.x + PIPE_WIDTH - 15, this.top - 15); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(this.x + 15, bY + 15); ctx.lineTo(this.x + PIPE_WIDTH - 15, bY + 15); ctx.stroke();
            
            ctx.shadowBlur = 0;
        }
    }

    function initEnvironment() {
        stars = []; planets = [];
        for(let i=0; i<100; i++) stars.push({x: Math.random()*450, y: Math.random()*800, s: Math.random()*2, v: Math.random()*0.8});
        const pColors = ['#ff007f', '#00f3ff', '#7209b7'];
        for(let i=0; i<3; i++) {
            planets.push({
                x: Math.random()*450, y: Math.random()*800,
                r: Math.random()*30 + 15, c: pColors[i],
                v: Math.random()*0.2 + 0.1
            });
        }
    }

    function resize() {
        const h = window.innerHeight;
        const w = Math.min(window.innerWidth, h * (9/16));
        canvas.width = 450; canvas.height = 800;
        canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
        initEnvironment();
    }

    function startGame() {
        score = 0; speedMult = 1.0; speedTimer = 0; pipes = []; particles = [];
        lastPipeX = canvas.width + 200;
        pipes.push(new Obstacle(lastPipeX));
        ship.reset();
        document.getElementById('score-val').innerText = "0";
        state = 'PLAYING';
        document.querySelectorAll('.menu-box').forEach(m => m.classList.remove('visible'));
        AudioEngine.boost();
        updateBestUI();
    }

    function endGame() {
        if(state === 'GAMEOVER') return;
        state = 'GAMEOVER';
        AudioEngine.crash();
        document.getElementById('final-score').innerText = score;
        if(score > high) { 
            high = score; 
            localStorage.setItem('neon_dash_2_best', high); 
        }
        updateBestUI();
        document.getElementById('game-over-screen').classList.add('visible');
    }

    function loop(t) {
        if(!lastTime) lastTime = t;
        const dt = t - lastTime;
        lastTime = t;

        ctx.fillStyle = '#010105';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        planets.forEach(p => {
            ctx.globalAlpha = 0.4;
            const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
            g.addColorStop(0, p.c); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
            if(state === 'PLAYING') p.x -= p.v * speedMult;
            if(p.x < -p.r) p.x = canvas.width + p.r;
        });

        ctx.globalAlpha = 1.0; ctx.fillStyle = '#fff';
        stars.forEach(s => {
            ctx.fillRect(s.x, s.y, s.s, s.s);
            if(state === 'PLAYING') {
                s.x -= s.v * speedMult;
                if(s.x < 0) s.x = canvas.width;
            }
        });

        if (state === 'PLAYING') {
            speedTimer += dt;
            // Every 5 seconds speed increase by 10%
            if(speedTimer >= 5000) { speedMult *= 1.1; speedTimer = 0; }
            if (canvas.width - lastPipeX >= PIPE_SPACING_X) {
                lastPipeX = canvas.width;
                pipes.push(new Obstacle(canvas.width));
            }
            for (let i = pipes.length - 1; i >= 0; i--) {
                const p = pipes[i];
                p.update(); p.draw();
                if(i === pipes.length - 1) lastPipeX = p.x;
                const pad = 12;
                if (ship.x + ship.w - pad > p.x && ship.x + pad < p.x + PIPE_WIDTH) {
                    if (ship.y + pad < p.top || ship.y + ship.h - pad > p.top + PIPE_GAP_HEIGHT) endGame();
                }
                if (!p.passed && p.x + PIPE_WIDTH < ship.x) {
                    p.passed = true; score++;
                    document.getElementById('score-val').innerText = score;
                    AudioEngine.point();
                }
                if (p.x < -100) pipes.splice(i, 1);
            }
        }

        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            ctx.globalAlpha = p.l; ctx.fillStyle = p.c;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            p.x -= 3 * speedMult; p.l -= 0.04;
            if(p.l <= 0) particles.splice(i, 1);
        }
        ctx.globalAlpha = 1.0;

        ship.update(); ship.draw();
        requestAnimationFrame(loop);
    }

    function startTutorial() {
        const overlay = document.getElementById('tutorial-overlay');
        overlay.style.display = 'flex';
        state = 'TUTORIAL';
        const steps = [
            { t: "Tap Screen to Boost Up", i: "👆" },
            { t: "Avoid the Energy Pillars", i: "🚧" },
            { t: "Speed increases every 5s", i: "⚡" },
            { t: "Launch Successful!", i: "🚀" }
        ];
        let step = 0;
        overlay.onclick = () => {
            step++;
            if(step < steps.length) {
                document.getElementById('tut-text').innerText = steps[step].t;
                document.getElementById('tut-icon').innerText = steps[step].i;
                AudioEngine.boost();
            } else {
                overlay.style.display = 'none';
                startGame();
            }
        };
    }

    document.getElementById('launch-btn').onclick = () => {
        document.getElementById('start-screen').classList.remove('visible');
        document.getElementById('permission-modal').classList.add('visible');
    };
    document.getElementById('tutorial-yes').onclick = () => {
        document.getElementById('permission-modal').classList.remove('visible');
        startTutorial();
    };
    document.getElementById('tutorial-no').onclick = () => {
        document.getElementById('permission-modal').classList.remove('visible');
        startGame();
    };
    document.getElementById('restart-btn').onclick = startGame;

    const handleAction = () => { if(state === 'PLAYING') { ship.vel = FLAP; AudioEngine.boost(); } };
    window.addEventListener('mousedown', handleAction);
    window.addEventListener('touchstart', (e) => { if(state === 'PLAYING') e.preventDefault(); handleAction(); }, {passive: false});
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleAction(); });

    window.addEventListener('resize', resize);
    resize();
    updateBestUI(); 
    requestAnimationFrame(loop);
</script>
</body>
</html>
